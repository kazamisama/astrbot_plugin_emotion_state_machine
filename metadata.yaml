name: astrbot_plugin_emotion_state_machine
display_name: Emotion State Machine 情绪状态机
desc: 模拟 BOT 的情绪状态机，维护可衰减的情绪维度，并可在 LLM 请求前注入低噪声情绪摘要。
help: 使用 /emotion_state 查看当前状态；/emotion_signal <signal> [intensity] 手动施加事件；/emotion_prompt 预览注入内容；管理员可用 /emotion_reset 重置。v0.10.0+ 新增 to_text_part() 与 apply_self_reply_signal() 公共方法，供 social_context 等主动回复决策者调用，详见 _PUBLIC_API.md。
version: v0.10.1
author: chiriu & 橘雪莉
repo: https://github.com/kazamisama/astrbot_plugin_emotion_state_machine
support_platforms:
  - aiocqhttp
  - webchat
astrbot_version: ">=4.13.0"
