<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESM · 情绪状态机</title>
<style>
  :root {
    --accent: #6366f1;
    --accent-2: #8b5cf6;
    --accent-grad: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    --accent-soft: #ede9fe;
    --green: #10b981;
    --green-soft: #d1fae5;
    --amber: #f59e0b;
    --amber-soft: #fef3c7;
    --red: #ef4444;
    --red-soft: #fee2e2;
    --text: #1a1d24;
    --text-2: #6b7280;
    --text-3: #9ca3af;
    --border: #e5e7eb;
    --border-soft: #f1f3f5;
    --card: #ffffff;
    --bg-grad: linear-gradient(135deg, #f5f3ff 0%, #fafbff 35%, #fdf2f8 100%);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    --radius: 14px;
    --radius-lg: 20px;
    --shadow-1: 0 1px 3px rgba(15, 23, 42, 0.06);
    --shadow-2: 0 4px 12px rgba(15, 23, 42, 0.08);
  }
  body { margin: 0; font-family: var(--font); color: var(--text); font-size: 14px; line-height: 1.5; background: var(--bg-grad); background-attachment: fixed; min-height: 100vh; }
  [data-theme="dark"] body { background: linear-gradient(135deg, #0b0d18 0%, #11132a 35%, #1a0d2a 100%); color: #e6e8f0; }
  .app { max-width: 1280px; margin: 0 auto; padding: 0 28px; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 24px 0 18px; }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-mark { width: 44px; height: 44px; display: grid; place-items: center; background: var(--accent-grad); color: #fff; border-radius: 12px; box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35); transform: rotate(-3deg); }
  .brand-text h1 { margin: 0; font-size: 1.15rem; font-weight: 700; letter-spacing: -0.01em; color: var(--text); }
  .brand-text p { margin: 2px 0 0; font-size: 0.78rem; color: var(--text-2); }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .status-chip { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 999px; font-size: 0.8rem; color: var(--text-2); box-shadow: var(--shadow-1); }
  .status-chip[data-state="ok"] { color: var(--green); }
  .status-chip[data-state="error"] { color: var(--red); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-3); }
  .status-chip[data-state="ok"] .status-dot { background: var(--green); box-shadow: 0 0 0 3px var(--green-soft); animation: pulse 2.4s ease-in-out infinite; }
  .status-chip[data-state="connecting"] .status-dot { background: var(--amber); }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.45 } }
  .icon-btn { width: 38px; height: 38px; display: grid; place-items: center; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text-2); cursor: pointer; box-shadow: var(--shadow-1); border-style: solid; border-width: 1px; }
  .icon-btn:hover { color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow-2); }
  .content { padding-bottom: 60px; }

  /* v0.9.8: settings dropdown */
  .settings-wrap { position: relative; }
  .settings-menu {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    width: 280px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-2);
    padding: 8px;
    z-index: 50;
  }
  .settings-menu[hidden] { display: none; }
  .settings-title {
    font-size: 0.7rem; font-weight: 700; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 6px 10px 10px;
    border-bottom: 1px solid var(--border-soft);
    margin-bottom: 6px;
  }
  .settings-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 10px; border-radius: 6px;
    cursor: pointer; font-size: 0.85rem; color: var(--text);
    line-height: 1.4;
  }
  .settings-item:hover { background: var(--border-soft); }
  .settings-item input[type="checkbox"] {
    margin: 2px 0 0; flex-shrink: 0; cursor: pointer;
    accent-color: var(--accent);
  }
  .settings-footer {
    font-size: 0.7rem; color: var(--text-3);
    padding: 8px 10px 4px;
    border-top: 1px solid var(--border-soft);
    margin-top: 4px;
    text-align: center;
  }

  /* v0.9.8: hide-* options */
  body.opt-hide-version #brand-sub,
  body.opt-hide-version #last-update,
  body.opt-hide-version .footer { display: none; }
  body.opt-hide-version .topbar { padding-bottom: 0; }
  /* v0.9.11: tighter compact mode */
  body.opt-compact { font-size: 12px; }
  body.opt-compact .content { font-size: 12px; padding-bottom: 30px; }
  body.opt-compact .topbar { padding: 14px 0 10px; }
  body.opt-compact .brand-mark { width: 32px; height: 32px; border-radius: 8px; }
  body.opt-compact .brand-mark svg { width: 16px; height: 16px; }
  body.opt-compact .brand-text h1 { font-size: 0.95rem; }
  body.opt-compact .brand-text p { font-size: 0.7rem; }
  body.opt-compact .status-chip { padding: 3px 10px; font-size: 0.7rem; }
  body.opt-compact .icon-btn { width: 30px; height: 30px; border-radius: 8px; }
  body.opt-compact .icon-btn svg { width: 14px; height: 14px; }
  body.opt-compact .topbar-right { gap: 8px; }
  body.opt-compact .hero { gap: 12px; margin-bottom: 16px; }
  body.opt-compact .hero-mood { padding: 16px 20px; gap: 14px 18px; }
  body.opt-compact .mood-orb { width: 56px; height: 56px; }
  body.opt-compact .mood-emoji { font-size: 30px; }
  body.opt-compact .mood-label { font-size: 1.15rem; }
  body.opt-compact .mood-desc { font-size: 0.75rem; }
  body.opt-compact .pad-row { gap: 6px; }
  body.opt-compact .pad-track { height: 6px; }
  body.opt-compact .pad-label { font-size: 0.7rem; }
  body.opt-compact .pad-val { font-size: 0.7rem; width: 30px; }
  body.opt-compact .side-stat { padding: 8px 14px; }
  body.opt-compact .side-stat-num { font-size: 1.15rem; }
  body.opt-compact .side-stat-label { font-size: 0.65rem; }
  body.opt-compact .stat-grid { gap: 10px; margin-bottom: 18px; }
  body.opt-compact .stat-card { padding: 12px 14px; }
  body.opt-compact .stat-icon { width: 28px; height: 28px; border-radius: 8px; }
  body.opt-compact .stat-icon svg { width: 16px; height: 16px; }
  body.opt-compact .stat-value { font-size: 1.1rem; }
  body.opt-compact .stat-label { font-size: 0.65rem; }
  body.opt-compact .section { margin-bottom: 18px; }
  body.opt-compact .section-head { margin-bottom: 10px; }
  body.opt-compact .section-head h2 { font-size: 0.9rem; }
  body.opt-compact .input, body.opt-compact .select { padding: 5px 10px; font-size: 0.75rem; }
  body.opt-compact .groups-grid { gap: 10px; }
  body.opt-compact .group-card { padding: 12px 14px; }
  body.opt-compact .group-name { font-size: 0.8rem; }
  body.opt-compact .label-badge { padding: 2px 8px; font-size: 0.65rem; }
  body.opt-compact .dim-row { margin: 3px 0; gap: 5px; }
  body.opt-compact .dim-label { font-size: 0.65rem; width: 36px; }
  body.opt-compact .dim-bar-bg { height: 4px; }
  body.opt-compact .dim-val { font-size: 0.65rem; width: 28px; }
  /* v0.9.16: compact-mode table cells */
  body.opt-compact .users-row .dim-row { gap: 3px; }
  body.opt-compact .users-row .dim-val { min-width: 18px; }
  body.opt-compact .group-meta { margin-top: 8px; padding-top: 8px; font-size: 0.65rem; }
  body.opt-compact .users-row { padding: 6px 10px; font-size: 0.7rem; }
  body.opt-compact .users-row.head { font-size: 0.6rem; }
  body.opt-compact .footer { padding: 10px 0 4px; font-size: 0.65rem; }
  .hero { display: grid; grid-template-columns: 1.7fr 1fr; gap: 18px; margin-bottom: 24px; }
  .hero-mood { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px 32px; display: grid; grid-template-columns: auto 1fr; gap: 24px 28px; box-shadow: var(--shadow-2); position: relative; overflow: hidden; }
  .mood-orb { width: 96px; height: 96px; border-radius: 50%; display: grid; place-items: center; background: linear-gradient(135deg, #c7d2fe 0%, #e9d5ff 100%); box-shadow: 0 8px 28px rgba(99, 102, 241, 0.25); grid-row: 1 / span 2; }
  .mood-emoji { font-size: 52px; line-height: 1; }
  .mood-label { font-size: 1.6rem; font-weight: 700; color: var(--text); letter-spacing: -0.02em; text-transform: capitalize; }
  .mood-desc { font-size: 0.85rem; color: var(--text-2); margin-top: 4px; }
  .mood-pad { grid-column: 2; display: flex; flex-direction: column; gap: 8px; }
  .pad-row { display: flex; align-items: center; gap: 10px; }
  .pad-label { width: 28px; font-weight: 700; font-size: 0.78rem; color: var(--text-3); text-align: center; cursor: help; }
  .pad-track { flex: 1; height: 8px; background: var(--border-soft); border-radius: 4px; overflow: hidden; }
  .pad-fill { height: 100%; background: var(--accent-grad); border-radius: 4px; transition: width .8s; }
  .pad-val { width: 36px; text-align: right; font-size: 0.75rem; color: var(--text-2); }
  .hero-side { display: grid; grid-template-rows: repeat(3, 1fr); gap: 10px; }
  .side-stat { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 20px; display: flex; align-items: center; box-shadow: var(--shadow-1); }
  .side-stat-num { font-size: 1.5rem; font-weight: 700; color: var(--text); margin-right: 14px; }
  .side-stat-label { font-size: 0.78rem; color: var(--text-2); }
  .stat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 28px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow-1); }
  .stat-icon { width: 40px; height: 40px; border-radius: 10px; display: grid; place-items: center; }
  .stat-value { font-size: 1.4rem; font-weight: 700; color: var(--text); }
  .stat-label { font-size: 0.75rem; color: var(--text-2); margin-top: 2px; }
  .energy-bar-bg { margin-top: 4px; height: 4px; background: var(--border-soft); border-radius: 2px; overflow: hidden; }
  .energy-bar-fg { height: 100%; border-radius: 2px; background: var(--green); transition: width 0.6s ease; }
  #energy-card.energy-low .energy-bar-fg { background: var(--red); }
  #energy-card.energy-mid .energy-bar-fg { background: var(--amber); }
  #energy-card.energy-high .energy-bar-fg { background: var(--green); }
  .section { margin-bottom: 28px; }
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
  .section-head h2 { margin: 0; font-size: 1.05rem; font-weight: 700; color: var(--text); }
  .input, .select { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; color: var(--text); font-size: 0.85rem; font-family: inherit; }
  .groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .group-card { background: var(--card); border: 1px solid var(--border); border-top: 3px solid var(--mood-color, var(--text-3)); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow-1); cursor: pointer; position: relative; }
  .group-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-2); }
  .group-card:hover .del-btn { opacity: 1; }
  .del-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; padding: 0;
    background: none; border: none;
    color: var(--text-3); font-size: 1.1rem; font-weight: 300;
    cursor: pointer; border-radius: 4px;
    opacity: 0; transition: opacity 0.15s, color 0.15s;
    flex-shrink: 0; margin-left: 2px;
  }
  .del-btn:hover { color: var(--red); }
  .group-card.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .group-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .group-name { font-weight: 600; font-size: 0.95rem; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 8px; }
  .label-badge { padding: 3px 10px; border-radius: 999px; font-size: 0.72rem; font-weight: 600; color: #fff; background: var(--mood-color, var(--text-3)); text-transform: capitalize; }
  .dim-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  /* v0.9.17: even tighter gap (2px) */
  .users-row .dim-row { gap: 2px; margin: 0; justify-content: flex-start; }
  .users-row .dim-bar-bg { flex: 1 1 0; min-width: 30px; }
  .users-row .dim-val { width: auto; min-width: 22px; flex: 0 0 auto; text-align: right; font-variant-numeric: tabular-nums; }
  .dim-label { width: 56px; font-size: 0.72rem; color: var(--text-2); text-align: right; }
  .dim-bar-bg { flex: 1; height: 6px; background: var(--border-soft); border-radius: 3px; overflow: hidden; }
  .dim-bar-fg { height: 100%; border-radius: 3px; }
  .dim-val { width: 36px; text-align: right; font-size: 0.72rem; color: var(--text-2); }
  .users-row .dim-val { width: 26px; font-size: 0.65rem; }
  .group-meta { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-soft); font-size: 0.75rem; color: var(--text-2); display: flex; justify-content: space-between; }
  .group-users-count { color: var(--accent); font-weight: 600; }
  .users-table { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-1); }
  .users-row { display: grid; grid-template-columns: 1.5fr 0.8fr 1fr 1fr 1fr 1fr 0.8fr 1.2fr; align-items: center; padding: 12px 18px; border-bottom: 1px solid var(--border-soft); font-size: 0.85rem; }
  .users-row.head { background: var(--border-soft); font-size: 0.72rem; font-weight: 600; color: var(--text-2); text-transform: uppercase; }
  .empty { text-align: center; padding: 60px 20px; background: var(--card); border: 1px dashed var(--border); border-radius: var(--radius); color: var(--text-2); }
  .empty-illustration { font-size: 56px; margin-bottom: 12px; }
  .empty-title { font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .footer { display: flex; align-items: center; padding: 20px 0 8px; margin-top: 32px; font-size: 0.75rem; color: var(--text-3); border-top: 1px solid var(--border-soft); }
  .footer-spacer { flex: 1; }
  .confirm-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 9999; animation: cfm-fade .15s ease; }
  .confirm-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px 28px; max-width: 400px; width: calc(100% - 40px); box-shadow: var(--shadow-3); }
  .confirm-box.danger { border-color: var(--red); }
  .confirm-msg { font-size: 0.95rem; color: var(--text); line-height: 1.6; white-space: pre-line; margin-bottom: 20px; }
  .confirm-actions { display: flex; justify-content: flex-end; gap: 10px; }
  .confirm-btn { padding: 7px 18px; border-radius: 8px; font-size: 0.85rem; font-weight: 500; cursor: pointer; font-family: inherit; transition: all .15s ease; border: 1px solid var(--border); background: var(--card); color: var(--text-2); }
  .confirm-btn:hover { background: var(--border-soft); }
  .confirm-btn.danger { background: var(--red); border-color: var(--red); color: #fff; }
  .confirm-btn.danger:hover { filter: brightness(1.15); }
  @keyframes cfm-fade { from { opacity: 0 } to { opacity: 1 } }
</style>

     If you see this in DevTools, you're on the new HTML.

<div class="app" id="app">
  <!-- Top bar -->

          </label>

            <input type="checkbox" id="opt-nonempty-only">

          </label>

            <input type="checkbox" id="opt-filter-bot">

  </header>

  <main class="content">
    <!-- HERO: current mood overview -->
    <section class="hero">
      <div class="hero-mood" id="hero-mood">
        <div class="mood-orb" id="mood-orb">
          <div class="mood-emoji" id="mood-emoji">🌊</div>

        <div class="side-stat">
          <div class="side-stat-num" id="side-transitions">0</div>
          <div class="side-stat-label">状态迁移</div>
        </div>
        <div class="side-stat">
          <div class="side-stat-num" id="side-mode">—</div>
          <div class="side-stat-label">评价模式</div>
        </div>
      </div>
    </section>

    <!-- Stats row -->
    <section class="stat-grid">
      <div class="stat-card">
        <div class="stat-icon" style="background: var(--accent-soft); color: var(--accent)">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
        </div>
        <div class="stat-body">
          <div class="stat-value" id="stat-scopes">—</div>
          <div class="stat-label">活跃群聊</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background: var(--green-soft); color: var(--green)">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
          </svg>
        </div>
        <div class="stat-body">
          <div class="stat-value" id="stat-users">—</div>
          <div class="stat-label">用户关系</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background: var(--amber-soft); color: var(--amber)">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
          </svg>
        </div>
        <div class="stat-body">
          <div class="stat-value" id="stat-signals">—</div>
          <div class="stat-label">信号类型</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background: var(--violet-soft); color: var(--violet)">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
        </div>
        <div class="stat-body">
          <div class="stat-value" id="stat-version">—</div>
          <div class="stat-label">插件版本</div>
        </div>
      </div>
      <div class="stat-card" id="energy-card">
        <div class="stat-icon" style="background: var(--accent-soft); color: var(--accent)">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="6" width="18" height="11" rx="2" />
            <line x1="23" y1="13" x2="23" y2="10" />
            <line x1="4" y1="10" x2="7" y2="10" stroke-width="1.5" />
            <line x1="4" y1="13" x2="7" y2="13" stroke-width="1.5" />
          </svg>
        </div>
        <div class="stat-body">
          <div class="stat-value" id="stat-energy">—</div>
          <div class="stat-label">Bot 精力</div>
          <div class="energy-bar-bg"><div class="energy-bar-fg" id="energy-bar"></div></div>
        </div>
      </div>
    </section>

    <!-- Groups grid -->
    <section class="section">
      <div class="section-head">
        <h2>群聊状态</h2>
        <div class="section-tools">
          <select id="filter-scope" class="select" title="按群聊过滤">
            <option value="">所有群聊</option>
          </select>
          <select id="filter-persona" class="select" title="按人格过滤">
            <option value="">所有人格</option>
          </select>
          <select id="filter-user" class="select" title="按用户筛选"><option value="">所有用户</option></select>
          <select id="sort-by" class="select" title="排序方式">
            <option value="">默认排序</option>
            <option value="time-desc">最近活跃 ↓</option>
            <option value="time-asc">最早活跃 ↑</option>
            <option value="active-desc">活跃人数 ↓</option>
            <option value="active-asc">活跃人数 ↑</option>
            <option value="valence-desc">愉悦度 ↓</option>
            <option value="valence-asc">愉悦度 ↑</option>
            <option value="arousal-desc">唤醒度 ↓</option>
            <option value="arousal-asc">唤醒度 ↑</option>
            <option value="stress-asc">压力 ↓</option>
            <option value="stress-desc">压力 ↑</option>
            <option value="curiosity-desc">好奇度 ↓</option>
            <option value="curiosity-asc">好奇度 ↑</option>
          </select>
        </div>
      </div>
      <div id="groups-grid" class="groups-grid">
        <div class="empty">
          <div class="empty-illustration">🌱</div>
          <div class="empty-title">还没有群聊活动</div>
          <div class="empty-desc">机器人接收消息后，这里会显示各群的情绪快照</div>
        </div>
      </div>
    </section>

    <!-- User relations table -->
    <section class="section" id="user-section" style="display: none">
      <div class="section-head">
        <h2>用户关系</h2>
        <span class="section-meta" id="user-count">—</span>
      </div>
      <div class="users-table" id="users-table"></div>
    </section>

    <footer class="footer">
      <span id="footer-text">Emotion State Machine · 情绪状态机</span>
      <span class="footer-spacer"></span>
      <span id="last-update">—</span>
    </footer>
  </main>
</div>
<script src="./app.js?v=0.9.48"></script>
</body>
</html>
